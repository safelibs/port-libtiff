      - Seed `safe/capi/libtiffxx-safe.map` from `original/libtiff/libtiffxx.map`, but treat the observed original `libtiffxx.so.6.0.1` dynsym and version data as the actual compatibility baseline because the map alone is not precise.
      - `safe/scripts/check-public-surface.py` must support a non-mutating validation mode that reads the checked-in inventory, input manifest, and current source inputs, fails on drift, and leaves `safe/abi/public-surface.json`, `safe/abi/public-surface.inputs.json`, and `safe/abi/platform-excluded-linux.txt` untouched.
      - Copy the minimal private-header subset needed by the copied tools into `safe/libtiff/`. This private surface is build-only and must not be installed as part of `libtiff-dev`.
      - Configure the copied safe-tree tools to include `safe/libtiff/` for private build-only headers and `safe/include/` for installed public headers, so the copied `tiffiop.h` contract is available only to in-tree builds.
      - Mirror `original/tools/`, `original/test/`, and `original/port/` into `safe/` so later phases can port the build glue and run the same C clients against the Rust library.
