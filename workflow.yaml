  - id: check_packaging_and_install
    type: check
    bounce_target: impl_packaging_compat
    prompt: |-
      Reviewer role: Packaging, staged-install, and package-payload reviewer.
      
      Review the current workspace for check phase `check_packaging_and_install`. Do not modify files.
      
      Run these commands from the repository root in order
      ```sh
      rm -rf /tmp/libtiff-safe-stage /tmp/libtiff-safe-test-cmake /tmp/libtiff-safe-test-cmake-no-target /tmp/libtiff-safe-test-pkgconfig /tmp/libtiff-safe-test-cpp /tmp/libtiff-safe-test-cpp-out.tiff
      cmake -S safe -B safe/build -G Ninja \
        -DCMAKE_BUILD_TYPE=RelWithDebInfo \
        -DCMAKE_INSTALL_PREFIX=/tmp/libtiff-safe-stage/usr \
        -DBUILD_SHARED_LIBS=ON \
        -Dtiff-tools=ON \
        -Dtiff-tests=ON \
        -Dtiff-contrib=OFF \
        -Dtiff-docs=OFF
      cmake --build safe/build --parallel
      cmake --install safe/build
      PKGCONFIG_FILE="$(find /tmp/libtiff-safe-stage/usr -type f -name 'libtiff-4.pc' -print -quit)"
      SAFE_STAGE_LIBDIR="$(find /tmp/libtiff-safe-stage/usr -type f -name 'libtiff.so.6*' -print -quit | xargs -r dirname)"
      SAFE_STAGE_LIBTIFFXX="$(find /tmp/libtiff-safe-stage/usr -type f -name 'libtiffxx.so.6*' -print -quit)"
      test -n "$PKGCONFIG_FILE"
      test -n "$SAFE_STAGE_LIBDIR"
      test -n "$SAFE_STAGE_LIBTIFFXX"
      cmake -S original/build/test_cmake -B /tmp/libtiff-safe-test-cmake -G Ninja \
        -DCMAKE_PREFIX_PATH=/tmp/libtiff-safe-stage/usr
      cmake --build /tmp/libtiff-safe-test-cmake --parallel
      LD_LIBRARY_PATH="$SAFE_STAGE_LIBDIR" /tmp/libtiff-safe-test-cmake/test
      cmake -S original/build/test_cmake_no_target -B /tmp/libtiff-safe-test-cmake-no-target -G Ninja \
        -DCMAKE_PREFIX_PATH=/tmp/libtiff-safe-stage/usr
      cmake --build /tmp/libtiff-safe-test-cmake-no-target --parallel
      LD_LIBRARY_PATH="$SAFE_STAGE_LIBDIR" /tmp/libtiff-safe-test-cmake-no-target/test
      PKG_CONFIG_PATH="$(dirname "$PKGCONFIG_FILE")" \
        cc original/build/test_cmake/test.c -o /tmp/libtiff-safe-test-pkgconfig \
        $(PKG_CONFIG_PATH="$(dirname "$PKGCONFIG_FILE")" pkg-config --cflags --libs libtiff-4)
      LD_LIBRARY_PATH="$SAFE_STAGE_LIBDIR" /tmp/libtiff-safe-test-pkgconfig
      PKG_CFLAGS="$(PKG_CONFIG_PATH="$(dirname "$PKGCONFIG_FILE")" pkg-config --cflags libtiff-4)"
      PKG_LIBS="$(PKG_CONFIG_PATH="$(dirname "$PKGCONFIG_FILE")" pkg-config --libs libtiff-4)"
      c++ -std=c++17 safe/test/install/tiffxx_staged_smoke.cpp -o /tmp/libtiff-safe-test-cpp \
        $PKG_CFLAGS \
        -L"$SAFE_STAGE_LIBDIR" -Wl,-rpath,"$SAFE_STAGE_LIBDIR" -ltiffxx \
        $PKG_LIBS
      LD_LIBRARY_PATH="$SAFE_STAGE_LIBDIR" /tmp/libtiff-safe-test-cpp \
        original/test/images/minisblack-1c-8b.tiff \
        /tmp/libtiff-safe-test-cpp-out.tiff
      safe/scripts/build-deb.sh --source-dir safe --out-dir safe/dist
      SAFE_LIBTIFF_DEB="$(find safe/dist -maxdepth 1 -type f -name 'libtiff6_*_*.deb' -print -quit)"
      SAFE_LIBTIFFXX_DEB="$(find safe/dist -maxdepth 1 -type f -name 'libtiffxx6_*_*.deb' -print -quit)"
      SAFE_LIBTIFF_DEV_DEB="$(find safe/dist -maxdepth 1 -type f -name 'libtiff-dev_*_*.deb' -print -quit)"
      SAFE_LIBTIFF_TOOLS_DEB="$(find safe/dist -maxdepth 1 -type f -name 'libtiff-tools_*_*.deb' -print -quit)"
