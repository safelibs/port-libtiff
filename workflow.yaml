      - Update `safe/debian/libtiff6.symbols` from the inventory rather than copying the original file verbatim. It must include `_TIFFcalloc@LIBTIFF_4.0`, `LogL16toY@LIBTIFF_4.0`, `LogL10toY@LIBTIFF_4.0`, `LogL16fromY@LIBTIFF_4.0`, `LogL10fromY@LIBTIFF_4.0`, `LogLuv24toXYZ@LIBTIFF_4.0`, `LogLuv32toXYZ@LIBTIFF_4.0`, `LogLuv24fromXYZ@LIBTIFF_4.0`, `LogLuv32fromXYZ@LIBTIFF_4.0`, `XYZtoRGB24@LIBTIFF_4.0`, `uv_decode@LIBTIFF_4.0`, and `uv_encode@LIBTIFF_4.0`.
      - Add `safe/scripts/check-packaged-install-surface.sh` and use it in this phase and the final sweep. It must extract each generated `.deb` into both a package-specific inspection directory and a combined temporary root, assert the expected package and file split from the extracted payloads, rerun the CMake sample consumers against the extracted package root, rerun the direct `pkg-config` consumer against the extracted package root, and compile and run `safe/test/install/tiffxx_staged_smoke.cpp` against the extracted package root.
      - Modify `test-original.sh` so it no longer compiles and installs the original library into `/usr/local`. It must instead read the package directory from `LIBTIFF_SAFE_DIST_DIR`, resolve the four safe `.deb` paths, verify the expected version string and version ordering, install those local `.deb` files after the container's base `apt-get install`, verify installed package versions with `dpkg-query -W`, verify `libtiff.so.6` resolves from the package-managed system path under `/usr/lib/$MULTIARCH`, verify ownership with `dpkg -S`, verify runtime resolution with `ldd`, and rerun the existing 13 dependent-package runtime checks.
      - Add a dedicated link-compatibility harness that consumes the concrete prepared object and `link.txt` corpus from `original/build-step2` as the primary already-compiled baseline, rewrites only the output path and the `libtiff` library and rpath references so those original objects link and run against `safe/build`, and compiles only the extra header-surface smoke objects needed for APIs that the prepared original objects do not cover.
      - Because `original/libtiff/libtiffxx.map` is wildcard-based, compare the safe `libtiffxx.so.6` versioned dynsym set directly against `original/build/libtiff/libtiffxx.so.6.0.1` in addition to checking the two `TIFFStreamOpen` overloads from the Debian symbols file.
