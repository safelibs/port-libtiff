      test -n "$SAFE_LIBTIFFXX_DEB"
      test -n "$SAFE_LIBTIFF_DEV_DEB"
      test -n "$SAFE_LIBTIFF_TOOLS_DEB"
      for deb in "$SAFE_LIBTIFF_DEB" "$SAFE_LIBTIFFXX_DEB" "$SAFE_LIBTIFF_DEV_DEB" "$SAFE_LIBTIFF_TOOLS_DEB"; do
        test "$(dpkg-deb -f "$deb" Version)" = '1:4.5.1+git230720-4ubuntu2.5+safelibs1'
