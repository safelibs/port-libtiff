      test -f safe/abi/public-surface.inputs.json
      test -f safe/test/CMakeLists.txt
      test -f safe/test/common.sh
      test -d safe/test/refs
      test -f safe/tools/CMakeLists.txt
      test -f safe/debian/control
      test -f safe/debian/rules
      test -f safe/debian/libtiff6.install
      test -f safe/debian/libtiffxx6.install
      test -f safe/debian/libtiff-dev.install
      test -f safe/debian/libtiff-tools.install
      test -f safe/debian/libtiff6.symbols
      test -f safe/debian/libtiffxx6.symbols
      ```
      
      Verify all of the following
      - `safe/` exists as both a Cargo project and a CMake project.
