      Reviewer role: Compatibility inventory and scaffold reviewer.
      
      Review the current workspace for check phase `check_surface_scaffold`. Do not modify files.
      
      Run these commands from the repository root in order
      ```sh
      cargo check --manifest-path safe/Cargo.toml
      python3 safe/scripts/check-public-surface.py \
        --inventory safe/abi/public-surface.json \
        --input-manifest safe/abi/public-surface.inputs.json \
        --linux-exclusions safe/abi/platform-excluded-linux.txt \
        --validate-existing-inventory \
        --c-header original/libtiff/tiffio.h \
        --cxx-header original/libtiff/tiffio.hxx \
        --platform linux \
        --map original/libtiff/libtiff.map \
        --xx-map original/libtiff/libtiffxx.map \
        --symbols original/debian/libtiff6.symbols \
        --xx-symbols original/debian/libtiffxx6.symbols \
        --tif-config original/build/libtiff/tif_config.h \
        --tiffconf original/build/libtiff/tiffconf.h \
        --library original/build/libtiff/libtiff.so.6.0.1 \
        --library-xx original/build/libtiff/libtiffxx.so.6.0.1 \
        --must-contain _TIFFcalloc LogL16toY LogL10toY LogL16fromY LogL10fromY LogLuv24toXYZ LogLuv32toXYZ LogLuv24fromXYZ LogLuv32fromXYZ XYZtoRGB24 uv_decode uv_encode TIFFCheckTile TIFFReadTile TIFFWriteTile TIFFReadFromUserBuffer TIFFDataWidth TIFFStreamOpen _TIFFCheckMalloc _TIFFGetExifFields TIFFSetCompressionScheme \
        --must-record-version _TIFFcalloc=LIBTIFF_4.0 LogL16toY=LIBTIFF_4.0 LogL10toY=LIBTIFF_4.0 LogL16fromY=LIBTIFF_4.0 LogL10fromY=LIBTIFF_4.0 LogLuv24toXYZ=LIBTIFF_4.0 LogLuv32toXYZ=LIBTIFF_4.0 LogLuv24fromXYZ=LIBTIFF_4.0 LogLuv32fromXYZ=LIBTIFF_4.0 XYZtoRGB24=LIBTIFF_4.0 uv_decode=LIBTIFF_4.0 uv_encode=LIBTIFF_4.0 TIFFStreamOpen=LIBTIFFXX_4.0 \
        --must-record-linux-exclusion TIFFOpenW TIFFOpenWExt
      cmake -S safe -B safe/build -G Ninja \
        -DCMAKE_BUILD_TYPE=RelWithDebInfo \
        -DBUILD_SHARED_LIBS=ON \
        -Dtiff-tools=OFF \
        -Dtiff-tests=OFF \
        -Dtiff-contrib=OFF \
        -Dtiff-docs=OFF
