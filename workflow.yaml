      Required Work
      - Represent `TIFF *` as an opaque Rust-owned allocation, not as a field-for-field recreation of `struct tiff`.
      - Preserve all behavior modeled in `tif_open.c`, `tif_close.c`, `tif_unix.c`, and `tif_version.c`: base mode acceptance for `r`, `r+`, `w`, `w+`, `a`, and `a+`; create-mode modifiers `4`, `8`, `b`, and `l`; fill-order modifiers `B`, `L`, and `H`; mmap and strip-chop modifiers `M`, `m`, `C`, and `c`; deferred and lazy strile modifiers `D` and `O`; header-only modifier `h`; callback storage and accessors; header initialization for classic TIFF and BigTIFF; and open-option-specific allocation caps and re-entrant handlers.
      - Implement `TIFFOpen`, `TIFFOpenExt`, `TIFFFdOpen`, `TIFFFdOpenExt`, `TIFFClientOpen`, `TIFFClientOpenExt`, `TIFFClose`, `TIFFCleanup`, `TIFFFileName`, `TIFFSetFileName`, `TIFFFileno`, `TIFFSetFileno`, `TIFFClientdata`, `TIFFSetClientdata`, `TIFFGetMode`, `TIFFSetMode`, `TIFFGetReadProc`, `TIFFGetWriteProc`, `TIFFGetSeekProc`, `TIFFGetCloseProc`, `TIFFGetSizeProc`, `TIFFGetMapFileProc`, `TIFFGetUnmapFileProc`, `TIFFGetVersion`, `TIFFIsTiled`, `TIFFIsByteSwapped`, `TIFFIsUpSampled`, `TIFFIsMSB2LSB`, `TIFFIsBigEndian`, `TIFFIsBigTIFF`, `TIFFError*`, `TIFFWarning*`, and `TIFFOpenOptions*`.
      - Implement exported memory helpers and checked helpers: `_TIFFmalloc`, `_TIFFcalloc`, `_TIFFrealloc`, `_TIFFmemset`, `_TIFFmemcpy`, `_TIFFmemcmp`, `_TIFFfree`, `_TIFFCheckMalloc`, `_TIFFCheckRealloc`, `_TIFFMultiply32`, `_TIFFMultiply64`, and `_TIFFClampDoubleToUInt32`.
      - Preserve the upstream semantic that `TIFFOpenOptionsSetMaxSingleMemAlloc` constrains internal `*_Ext` helpers, not the public `_TIFFmalloc`, `_TIFFcalloc`, or `_TIFFrealloc` entry points.
      - Do not run the upstream `test_open_options` binary in this phase. It also exercises `TIFFSetField()` and `TIFFWriteDirectory()`, so that verification belongs in phase 5.
      - Implement close-path resource teardown ordering from `tif_close.c` in this phase. Add the full write-side `TIFFFlush` and `TIFFFlushData` behavior that `TIFFClose` invokes on writable handles in phase 6.
      - The build-only internal handle must expose the callbacks and state that copied tools actually dereference from `tiffiop.h`, including `tif_name`, `tif_seekproc`, and the raw-buffer and decode fields consumed by `fax2tiff.c`.
      - Keep `unsafe` localized to FFI pointer conversion, callback invocation, and exported ABI boundaries.
      
      Success Criteria
      - `testtypes` passes against the safe library.
      - `api_handle_smoke` directly calls `_TIFFcalloc`, `TIFFGetVersion`, representative `TIFFIs*` queries, the directory-independent `TIFFOpenOptions*` API, and callback accessor functions.
      - `api_open_mode_smoke` covers the `TIFFOpen`/`TIFFFdOpen`/`TIFFClientOpen` mode-string matrix including `wb`, `wl`, `w4`, `w8`, `rM`, `rm`, `rC`, `rc`, `rD`, `rO`, `rh`, `rH`, `rL`, `w8DO`, `w+`, and `a+`.
      - Symbol checks confirm `_TIFFcalloc`, the checked-allocation helpers, `TIFFGetVersion`, and the `TIFFIs*` helpers are exported.
      
