      - `safe/abi/public-surface.json` contains the required Linux-visible APIs, records `TIFFOpenW` and `TIFFOpenWExt` as Linux exclusions, and records `_TIFFcalloc` plus the LogLuv helper family as required `LIBTIFF_4.0` exports.
      - The copied headers, tests, tools, Debian metadata including the `.install` manifests and symbols files, and the reusable upstream shell-test runner all exist in `safe/`.
      
