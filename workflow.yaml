      - Seed `safe/capi/libtiff-safe.map` from `original/libtiff/libtiff.map`, preserving `LIBTIFF_4.0` through `LIBTIFF_4.5`, removing Linux-excluded Windows-only names, then add the header-only Linux-visible symbols required for full source and link compatibility.
